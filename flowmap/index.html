<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Flowmap 生成 · HanPi 百宝箱</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #0e1210;
      --panel: #171c19;
      --panel2: #1d2420;
      --line: #2a332e;
      --text: #e8efe9;
      --muted: #8a9a90;
      --accent: #3dcf8e;
      --accent-dim: #1f6b49;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      font-family: "DM Sans", system-ui, sans-serif;
      color: var(--text);
      background: var(--bg);
    }
    header {
      display: flex;
      align-items: baseline;
      gap: 14px;
      flex-wrap: wrap;
      padding: 16px 20px;
      border-bottom: 1px solid var(--line);
      background: var(--panel);
    }
    header a { color: var(--muted); text-decoration: none; font-size: 0.9rem; }
    header a:hover { color: var(--accent); }
    header h1 { margin: 0; font-size: 1.15rem; font-weight: 700; }
    header h1 span { color: var(--accent); }
    .layout {
      display: grid;
      grid-template-columns: 300px 1fr;
      min-height: calc(100vh - 57px);
    }
    @media (max-width: 860px) { .layout { grid-template-columns: 1fr; } }
    aside {
      border-right: 1px solid var(--line);
      background: var(--panel);
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      overflow: auto;
    }
    .tabs {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 6px;
      background: var(--panel2);
      padding: 4px;
      border-radius: 10px;
      border: 1px solid var(--line);
    }
    .tabs button {
      border: 0;
      background: transparent;
      color: var(--muted);
      font: inherit;
      font-size: 0.85rem;
      font-weight: 600;
      padding: 8px 6px;
      border-radius: 8px;
      cursor: pointer;
    }
    .tabs button.active {
      background: var(--accent-dim);
      color: var(--text);
    }
    .panel { display: none; flex-direction: column; gap: 12px; }
    .panel.active { display: flex; }
    .drop {
      border: 1px dashed var(--line);
      border-radius: 10px;
      padding: 14px;
      background: var(--panel2);
      cursor: pointer;
      transition: border-color .15s;
    }
    .drop:hover, .drop.drag { border-color: var(--accent-dim); }
    .drop .label {
      font-size: 0.72rem;
      color: var(--muted);
      margin-bottom: 4px;
      font-family: "JetBrains Mono", monospace;
    }
    .drop .name { font-size: 0.9rem; word-break: break-all; }
    .drop input { display: none; }
    label.row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
      font-size: 0.88rem;
      color: var(--muted);
    }
    label.row span.v {
      font-family: "JetBrains Mono", monospace;
      color: var(--text);
      min-width: 3.2em;
      text-align: right;
    }
    input[type="range"] { width: 100%; accent-color: var(--accent); }
    .checks { display: flex; flex-direction: column; gap: 8px; font-size: 0.9rem; }
    .checks label { display: flex; gap: 8px; align-items: center; cursor: pointer; }
    .btn-row { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
    button.action {
      border: 1px solid var(--accent-dim);
      background: rgba(61, 207, 142, 0.12);
      color: var(--text);
      font: inherit;
      font-size: 0.88rem;
      font-weight: 600;
      padding: 10px 8px;
      border-radius: 8px;
      cursor: pointer;
    }
    button.action:hover { border-color: var(--accent); }
    button.action:disabled { opacity: 0.45; cursor: not-allowed; }
    button.action.secondary {
      background: transparent;
      border-color: var(--line);
      color: var(--muted);
    }
    .status {
      font-family: "JetBrains Mono", monospace;
      font-size: 0.75rem;
      color: var(--muted);
      min-height: 1.2em;
    }
    .status.busy { color: var(--accent); }
    .hint {
      font-size: 0.78rem;
      color: var(--muted);
      line-height: 1.45;
      margin-top: auto;
    }
    .hint code {
      font-family: "JetBrains Mono", monospace;
      font-size: 0.72rem;
      color: var(--accent);
    }
    .stage {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 16px;
      background:
        linear-gradient(45deg, #141916 25%, transparent 25%),
        linear-gradient(-45deg, #141916 25%, transparent 25%),
        linear-gradient(45deg, transparent 75%, #141916 75%),
        linear-gradient(-45deg, transparent 75%, #141916 75%);
      background-size: 24px 24px;
      background-position: 0 0, 0 12px, 12px -12px, -12px 0;
      background-color: #101411;
    }
    canvas#gl {
      max-width: 100%;
      max-height: calc(100vh - 100px);
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #000;
    }
  </style>
</head>
<body>
  <header>
    <a href="../">← HanPi 百宝箱</a>
    <h1>Flowmap <span>生成</span></h1>
  </header>
  <div class="layout">
    <aside>
      <div class="tabs">
        <button type="button" class="active" data-mode="generate">单图生成</button>
        <button type="button" data-mode="preview">双图预览</button>
      </div>

      <div class="panel active" id="panelGenerate">
        <div class="drop" id="dropGen" data-kind="gen">
          <div class="label">SOURCE → FLOWMAP</div>
          <div class="name" id="nameGen">拖入一张纹理，一键生成 flowmap</div>
          <input type="file" accept="image/*" />
        </div>
        <button type="button" class="action secondary" id="btnSample" style="width:100%">加载示例图</button>
        <label class="row">Tensor σ <span class="v" id="vTensor">4.0</span></label>
        <input type="range" id="tensorSigma" min="1" max="16" step="0.5" value="4" />
        <label class="row">连续引导 σ <span class="v" id="vGuide">48.0</span></label>
        <input type="range" id="guideSigma" min="4" max="48" step="1" value="48" />
        <label class="row">边界软化 <span class="v" id="vSeam">8</span></label>
        <input type="range" id="seamBand" min="4" max="96" step="1" value="8" />
        <div class="checks">
          <label><input type="checkbox" id="seamless" checked /> 无缝平铺（消四边硬切）</label>
        </div>
        <div class="btn-row">
          <button type="button" class="action" id="btnGenerate">生成</button>
          <button type="button" class="action secondary" id="btnDownload" disabled>下载 Flowmap</button>
        </div>
        <div class="status" id="genStatus"></div>
      </div>

      <div class="panel" id="panelPreview">
        <div class="drop" id="dropSrc" data-kind="src">
          <div class="label">SOURCE</div>
          <div class="name" id="nameSrc">拖入源纹理</div>
          <input type="file" accept="image/*" />
        </div>
        <div class="drop" id="dropFlow" data-kind="flow">
          <div class="label">FLOWMAP (RG)</div>
          <div class="name" id="nameFlow">拖入已有 flowmap</div>
          <input type="file" accept="image/*" />
        </div>
      </div>

      <label class="row">Strength <span class="v" id="vStrength">0.100</span></label>
      <input type="range" id="strength" min="0" max="0.25" step="0.001" value="0.1" />

      <label class="row">Speed <span class="v" id="vSpeed">0.40</span></label>
      <input type="range" id="speed" min="0" max="2" step="0.01" value="0.4" />

      <label class="row">Time <span class="v" id="vTime">0.10</span></label>
      <input type="range" id="time" min="0" max="10" step="0.01" value="0.1" />

      <div class="checks">
        <label><input type="checkbox" id="play" checked /> 自动播放</label>
        <label><input type="checkbox" id="pingpong" checked /> Ping-pong</label>
        <label class="row">乒乓锐度 <span class="v" id="vBlend">1.0</span></label>
        <input type="range" id="blendSharp" min="0.5" max="4" step="0.1" value="1" />
        <label><input type="checkbox" id="showFlow" /> 显示 Flowmap</label>
        <label><input type="checkbox" id="tilePreview" /> 2×2 平铺预览（查接缝）</label>
        <label><input type="checkbox" id="invertY" /> 翻转 Flow Y</label>
      </div>

      <p class="hint">
        <strong>单图生成（主功能）</strong>：从一张纹理估流动方向，生成 Unity 兼容 Flowmap（<code>RG = 0.5+0.5·dir</code>），并实时预览扭曲；可下载。<br />
        <strong>双图预览（附加）</strong>：已有源图 + Flowmap 时，直接导入查看效果。<br />
        「无缝平铺」对齐四边；2×2 预览查接缝。RG 色块急转不一定是接缝问题。
      </p>
    </aside>
    <div class="stage">
      <canvas id="gl" width="1024" height="1024"></canvas>
    </div>
  </div>

  <script type="module">
    import { extractFlowmap, imageToGray, rgbaToImageBitmap } from "./extract.js";

    const canvas = document.getElementById("gl");
    const gl = canvas.getContext("webgl", { alpha: false, premultipliedAlpha: false });
    if (!gl) {
      alert("当前浏览器不支持 WebGL");
      throw new Error("no webgl");
    }

    const vs = `
      attribute vec2 aPos;
      varying vec2 vUv;
      void main() {
        vUv = aPos * 0.5 + 0.5;
        gl_Position = vec4(aPos, 0.0, 1.0);
      }
    `;
    const fs = `
      precision mediump float;
      varying vec2 vUv;
      uniform sampler2D uSrc;
      uniform sampler2D uFlow;
      uniform float uStrength;
      uniform float uTime;
      uniform float uHasSrc;
      uniform float uHasFlow;
      uniform float uShowFlow;
      uniform float uPingPong;
      uniform float uInvertY;
      uniform float uBlendSharp;
      uniform float uTilePreview;

      void main() {
        vec2 uv = vUv;
        if (uTilePreview > 0.5) uv = fract(vUv * 2.0);

        if (uHasFlow < 0.5 && uHasSrc < 0.5) {
          vec2 g = floor(uv * 16.0);
          float c = mod(g.x + g.y, 2.0) > 0.5 ? 0.18 : 0.12;
          gl_FragColor = vec4(vec3(c), 1.0);
          return;
        }
        // fract wrap in shader — WebGL1 NPOT + REPEAT often samples pure black
        if (uShowFlow > 0.5 && uHasFlow > 0.5) {
          gl_FragColor = vec4(texture2D(uFlow, fract(uv)).rgb, 1.0);
          return;
        }
        // Only flowmap loaded (common when checking a downloaded RG map)
        if (uHasSrc < 0.5) {
          if (uHasFlow > 0.5) {
            gl_FragColor = vec4(texture2D(uFlow, fract(uv)).rgb, 1.0);
            return;
          }
          gl_FragColor = vec4(0.1, 0.12, 0.11, 1.0);
          return;
        }
        if (uHasFlow < 0.5) {
          gl_FragColor = texture2D(uSrc, fract(uv));
          return;
        }
        vec2 flow = texture2D(uFlow, fract(uv)).rg * 2.0 - 1.0;
        if (uInvertY > 0.5) flow.y = -flow.y;

        // Single layer: continuous drift (visible jump if time wraps)
        if (uPingPong < 0.5) {
          gl_FragColor = texture2D(uSrc, fract(uv - flow * uStrength * uTime));
          return;
        }

        // Catlike-style dual layer: centered offset + per-layer weight
        float t0 = fract(uTime);
        float t1 = fract(uTime + 0.5);
        float w0 = 1.0 - abs(2.0 * t0 - 1.0);
        float w1 = 1.0 - abs(2.0 * t1 - 1.0);
        float sharp = max(uBlendSharp, 0.5);
        w0 = pow(max(w0, 0.0), sharp);
        w1 = pow(max(w1, 0.0), sharp);
        vec2 uv0 = fract(uv - flow * uStrength * (t0 - 0.5));
        vec2 uv1 = fract(uv - flow * uStrength * (t1 - 0.5));
        vec4 c0 = texture2D(uSrc, uv0);
        vec4 c1 = texture2D(uSrc, uv1);
        gl_FragColor = (c0 * w0 + c1 * w1) / max(w0 + w1, 1e-4);
      }
    `;

    function compile(type, src) {
      const s = gl.createShader(type);
      gl.shaderSource(s, src);
      gl.compileShader(s);
      if (!gl.getShaderParameter(s, gl.COMPILE_STATUS)) throw new Error(gl.getShaderInfoLog(s));
      return s;
    }
    const prog = gl.createProgram();
    gl.attachShader(prog, compile(gl.VERTEX_SHADER, vs));
    gl.attachShader(prog, compile(gl.FRAGMENT_SHADER, fs));
    gl.linkProgram(prog);
    if (!gl.getProgramParameter(prog, gl.LINK_STATUS)) throw new Error(gl.getProgramInfoLog(prog));
    gl.useProgram(prog);

    const buf = gl.createBuffer();
    gl.bindBuffer(gl.ARRAY_BUFFER, buf);
    gl.bufferData(gl.ARRAY_BUFFER, new Float32Array([-1, -1, 1, -1, -1, 1, 1, 1]), gl.STATIC_DRAW);
    const aPos = gl.getAttribLocation(prog, "aPos");
    gl.enableVertexAttribArray(aPos);
    gl.vertexAttribPointer(aPos, 2, gl.FLOAT, false, 0, 0);

    const loc = {
      uSrc: gl.getUniformLocation(prog, "uSrc"),
      uFlow: gl.getUniformLocation(prog, "uFlow"),
      uStrength: gl.getUniformLocation(prog, "uStrength"),
      uTime: gl.getUniformLocation(prog, "uTime"),
      uHasSrc: gl.getUniformLocation(prog, "uHasSrc"),
      uHasFlow: gl.getUniformLocation(prog, "uHasFlow"),
      uShowFlow: gl.getUniformLocation(prog, "uShowFlow"),
      uPingPong: gl.getUniformLocation(prog, "uPingPong"),
      uInvertY: gl.getUniformLocation(prog, "uInvertY"),
      uBlendSharp: gl.getUniformLocation(prog, "uBlendSharp"),
      uTilePreview: gl.getUniformLocation(prog, "uTilePreview"),
    };

    function makeTex() {
      const t = gl.createTexture();
      gl.bindTexture(gl.TEXTURE_2D, t);
      gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_MIN_FILTER, gl.LINEAR);
      gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_MAG_FILTER, gl.LINEAR);
      // CLAMP required for non-power-of-two in WebGL1; wrapping done via fract() in shader
      gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_WRAP_S, gl.CLAMP_TO_EDGE);
      gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_WRAP_T, gl.CLAMP_TO_EDGE);
      gl.texImage2D(gl.TEXTURE_2D, 0, gl.RGBA, 1, 1, 0, gl.RGBA, gl.UNSIGNED_BYTE, new Uint8Array([40, 40, 40, 255]));
      return t;
    }

    const texSrc = makeTex();
    const texFlow = makeTex();
    gl.uniform1i(loc.uSrc, 0);
    gl.uniform1i(loc.uFlow, 1);

    const state = {
      hasSrc: false,
      hasFlow: false,
      time: 0.1,
      last: performance.now(),
      genImage: null,
      flowCanvas: null,
      flowName: "flowmap.png",
    };

    /** Draw through canvas: even size + opaque composite (avoids NPOT/alpha black). */
    function toUploadCanvas(img) {
      let w = Math.max(1, img.width | 0);
      let h = Math.max(1, img.height | 0);
      // Even dimensions avoid rare UNPACK_ALIGNMENT edge cases (e.g. 1023 wide)
      if (w % 2) w += 1;
      if (h % 2) h += 1;
      const c = document.createElement("canvas");
      c.width = w;
      c.height = h;
      const ctx = c.getContext("2d", { alpha: false });
      ctx.fillStyle = "#808080";
      ctx.fillRect(0, 0, w, h);
      ctx.drawImage(img, 0, 0, img.width, img.height);
      return c;
    }

    function upload(tex, img) {
      const src = toUploadCanvas(img);
      gl.bindTexture(gl.TEXTURE_2D, tex);
      gl.pixelStorei(gl.UNPACK_ALIGNMENT, 1);
      gl.pixelStorei(gl.UNPACK_FLIP_Y_WEBGL, 1);
      gl.pixelStorei(gl.UNPACK_PREMULTIPLY_ALPHA_WEBGL, 0);
      gl.texImage2D(gl.TEXTURE_2D, 0, gl.RGBA, gl.RGBA, gl.UNSIGNED_BYTE, src);
      gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_MIN_FILTER, gl.LINEAR);
      gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_MAG_FILTER, gl.LINEAR);
      gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_WRAP_S, gl.CLAMP_TO_EDGE);
      gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_WRAP_T, gl.CLAMP_TO_EDGE);
      const err = gl.getError();
      if (err) console.warn("tex upload GL error", err, src.width, src.height);
    }

    function fitCanvas(img) {
      const max = 1024;
      let w = img.width;
      let h = img.height;
      if (w > max || h > max) {
        const s = max / Math.max(w, h);
        w = Math.round(w * s);
        h = Math.round(h * s);
      }
      if (w % 2) w += 1;
      if (h % 2) h += 1;
      canvas.width = Math.max(2, w);
      canvas.height = Math.max(2, h);
    }

    function loadImageFile(file) {
      return new Promise((resolve, reject) => {
        const url = URL.createObjectURL(file);
        const img = new Image();
        img.onload = () => {
          URL.revokeObjectURL(url);
          resolve(img);
        };
        img.onerror = reject;
        img.src = url;
      });
    }

    async function loadFile(file, kind) {
      const img = await loadImageFile(file);
      if (kind === "src") {
        upload(texSrc, img);
        state.hasSrc = true;
        fitCanvas(img);
        document.getElementById("nameSrc").textContent = file.name;
      } else if (kind === "flow") {
        upload(texFlow, img);
        state.hasFlow = true;
        if (!state.hasSrc) {
          fitCanvas(img);
          // No source yet — show the flowmap itself instead of a black/empty stage
          document.getElementById("showFlow").checked = true;
        }
        document.getElementById("nameFlow").textContent = file.name;
      } else if (kind === "gen") {
        state.genImage = img;
        state.flowName = file.name.replace(/\.[^.]+$/, "") + "_flowmap.png";
        document.getElementById("nameGen").textContent = file.name;
        document.getElementById("genStatus").textContent = `已载入 ${img.width}×${img.height}，点击「生成」`;
        document.getElementById("genStatus").classList.remove("busy");
        upload(texSrc, img);
        state.hasSrc = true;
        // Keep previous flow if any; preview source until user generates
        fitCanvas(img);
      }
    }

    function wireDrop(el) {
      const input = el.querySelector("input");
      const kind = el.dataset.kind;
      el.addEventListener("click", () => input.click());
      el.addEventListener("dragover", (e) => { e.preventDefault(); el.classList.add("drag"); });
      el.addEventListener("dragleave", () => el.classList.remove("drag"));
      el.addEventListener("drop", (e) => {
        e.preventDefault();
        el.classList.remove("drag");
        const f = e.dataTransfer.files?.[0];
        if (f) loadFile(f, kind);
      });
      input.addEventListener("change", () => {
        const f = input.files?.[0];
        if (f) loadFile(f, kind);
      });
    }
    wireDrop(document.getElementById("dropSrc"));
    wireDrop(document.getElementById("dropFlow"));
    wireDrop(document.getElementById("dropGen"));

    const SAMPLE_URL = new URL("./examples/sample-source.png", import.meta.url).href;

    async function loadSampleImage() {
      const genStatus = document.getElementById("genStatus");
      try {
        genStatus.classList.add("busy");
        genStatus.textContent = "加载示例图…";
        const img = await new Promise((resolve, reject) => {
          const im = new Image();
          im.onload = () => resolve(im);
          im.onerror = () => reject(new Error("示例图加载失败"));
          im.src = SAMPLE_URL;
        });
        state.genImage = img;
        state.flowName = "sample-source_flowmap.png";
        document.getElementById("nameGen").textContent = "examples/sample-source.png";
        upload(texSrc, img);
        state.hasSrc = true;
        fitCanvas(img);
        genStatus.classList.remove("busy");
        genStatus.textContent = `示例已载入 ${img.width}×${img.height}，点击「生成」`;
      } catch (err) {
        console.error(err);
        genStatus.classList.remove("busy");
        genStatus.textContent = err?.message || "示例加载失败";
      }
    }

    document.getElementById("btnSample").addEventListener("click", loadSampleImage);
    // Demo-ready: load bundled sample on open
    loadSampleImage();

    // Mode tabs
    const tabs = document.querySelectorAll(".tabs button");
    const panelPreview = document.getElementById("panelPreview");
    const panelGenerate = document.getElementById("panelGenerate");
    tabs.forEach((btn) => {
      btn.addEventListener("click", () => {
        tabs.forEach((b) => b.classList.remove("active"));
        btn.classList.add("active");
        const mode = btn.dataset.mode;
        panelPreview.classList.toggle("active", mode === "preview");
        panelGenerate.classList.toggle("active", mode === "generate");
      });
    });

    const elStrength = document.getElementById("strength");
    const elSpeed = document.getElementById("speed");
    const elTime = document.getElementById("time");
    const elTensor = document.getElementById("tensorSigma");
    const elGuide = document.getElementById("guideSigma");
    const elSeam = document.getElementById("seamBand");
    const elSeamless = document.getElementById("seamless");
    const elPlay = document.getElementById("play");
    const elPing = document.getElementById("pingpong");
    const elBlend = document.getElementById("blendSharp");
    const elShowFlow = document.getElementById("showFlow");
    const elTile = document.getElementById("tilePreview");
    const elInvertY = document.getElementById("invertY");
    const genStatus = document.getElementById("genStatus");
    const btnGenerate = document.getElementById("btnGenerate");
    const btnDownload = document.getElementById("btnDownload");

    function syncLabels() {
      document.getElementById("vStrength").textContent = Number(elStrength.value).toFixed(3);
      document.getElementById("vSpeed").textContent = Number(elSpeed.value).toFixed(2);
      document.getElementById("vTime").textContent = Number(elTime.value).toFixed(2);
      document.getElementById("vTensor").textContent = Number(elTensor.value).toFixed(1);
      document.getElementById("vGuide").textContent = Number(elGuide.value).toFixed(1);
      document.getElementById("vSeam").textContent = String(Math.round(Number(elSeam.value)));
      document.getElementById("vBlend").textContent = Number(elBlend.value).toFixed(1);
    }
    [elStrength, elSpeed, elTime, elTensor, elGuide, elSeam, elBlend].forEach((el) => el.addEventListener("input", syncLabels));
    syncLabels();
    elTime.addEventListener("input", () => { state.time = Number(elTime.value); });

    btnGenerate.addEventListener("click", async () => {
      if (!state.genImage) {
        genStatus.textContent = "请先拖入一张纹理";
        return;
      }
      btnGenerate.disabled = true;
      btnDownload.disabled = true;
      genStatus.classList.add("busy");
      genStatus.textContent = "生成中（大图可能要几秒）…";
      await new Promise((r) => setTimeout(r, 30));
      try {
        const t0 = performance.now();
        const { gray, w, h } = imageToGray(state.genImage, 1024);
        const { rgba } = extractFlowmap(gray, w, h, {
          gradSigma: 1,
          tensorSigma: Number(elTensor.value),
          guideSigma: Number(elGuide.value),
          invertY: true,
          seamless: elSeamless.checked,
          seamBand: Number(elSeam.value),
        });
        const flowCanvas = rgbaToImageBitmap(rgba, w, h);
        state.flowCanvas = flowCanvas;
        upload(texSrc, state.genImage);
        upload(texFlow, flowCanvas);
        state.hasSrc = true;
        state.hasFlow = true;
        fitCanvas(state.genImage);
        document.getElementById("nameFlow").textContent = "(generated)";
        btnDownload.disabled = false;
        genStatus.classList.remove("busy");
        genStatus.textContent = `完成 ${w}×${h} · ${(performance.now() - t0).toFixed(0)}ms · 已可预览`;
      } catch (err) {
        console.error(err);
        genStatus.classList.remove("busy");
        genStatus.textContent = "生成失败：" + (err?.message || err);
      } finally {
        btnGenerate.disabled = false;
      }
    });

    btnDownload.addEventListener("click", () => {
      if (!state.flowCanvas) return;
      const a = document.createElement("a");
      a.href = state.flowCanvas.toDataURL("image/png");
      a.download = state.flowName || "flowmap.png";
      a.click();
    });

    function frame(now) {
      const dt = Math.min(0.05, (now - state.last) / 1000);
      state.last = now;
      if (elPlay.checked) {
        state.time += dt * Number(elSpeed.value);
        elTime.value = String(state.time % 10);
        document.getElementById("vTime").textContent = Number(elTime.value).toFixed(2);
      }

      gl.viewport(0, 0, canvas.width, canvas.height);
      gl.activeTexture(gl.TEXTURE0);
      gl.bindTexture(gl.TEXTURE_2D, texSrc);
      gl.activeTexture(gl.TEXTURE1);
      gl.bindTexture(gl.TEXTURE_2D, texFlow);

      gl.uniform1f(loc.uStrength, Number(elStrength.value));
      gl.uniform1f(loc.uTime, state.time);
      gl.uniform1f(loc.uHasSrc, state.hasSrc ? 1 : 0);
      gl.uniform1f(loc.uHasFlow, state.hasFlow ? 1 : 0);
      gl.uniform1f(loc.uShowFlow, elShowFlow.checked ? 1 : 0);
      gl.uniform1f(loc.uPingPong, elPing.checked ? 1 : 0);
      gl.uniform1f(loc.uInvertY, elInvertY.checked ? 1 : 0);
      gl.uniform1f(loc.uBlendSharp, Number(elBlend.value));
      gl.uniform1f(loc.uTilePreview, elTile.checked ? 1 : 0);
      gl.drawArrays(gl.TRIANGLE_STRIP, 0, 4);
      requestAnimationFrame(frame);
    }
    requestAnimationFrame(frame);
  </script>
</body>
</html>
